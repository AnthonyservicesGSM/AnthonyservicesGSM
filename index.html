
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07111f" />
  <meta name="description" content="Anthony Services GSM : logements, cartes SIM, services bancaires, gravillons, élevage, gaz, Canal Box et smartphones. Contact direct WhatsApp." />
  <title>Anthony Services GSM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050914;
      --bg-2: #07111f;
      --surface: rgba(255, 255, 255, 0.08);
      --surface-strong: rgba(255, 255, 255, 0.14);
      --stroke: rgba(255, 255, 255, 0.16);
      --text: #f8fbff;
      --muted: #aebbd0;
      --blue: #2f7dff;
      --blue-2: #74d7ff;
      --red: #ff375f;
      --gold: #f5c46b;
      --green: #24d366;
      --green-dark: #119747;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --radius: 28px;
      --header-h: 76px;
      --safe-x: clamp(16px, 4vw, 64px);
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-width: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(47, 125, 255, 0.36), transparent 28rem),
        radial-gradient(circle at 90% 8%, rgba(255, 55, 95, 0.24), transparent 24rem),
        radial-gradient(circle at 55% 88%, rgba(36, 211, 102, 0.15), transparent 30rem),
        linear-gradient(135deg, #030612 0%, #07111f 48%, #100812 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      pointer-events: none;
      opacity: 0.32;
      background-image:
        linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 78%, transparent 100%);
    }

    a { color: inherit; text-decoration: none; }
    button, a { -webkit-tap-highlight-color: transparent; }
    img { display: block; max-width: 100%; }

    .noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: 0.11;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.76' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");
      mix-blend-mode: screen;
    }

    .ambient-blob {
      position: fixed;
      z-index: -2;
      width: 48vmax;
      height: 48vmax;
      border-radius: 36% 64% 58% 42% / 50% 32% 68% 50%;
      filter: blur(34px);
      opacity: 0.26;
      background: linear-gradient(135deg, rgba(47, 125, 255, 0.8), rgba(255, 55, 95, 0.45), rgba(36, 211, 102, 0.36));
      animation: blobMorph 18s ease-in-out infinite alternate, gradientShift 12s ease infinite;
      background-size: 200% 200%;
      transform: translate3d(calc(var(--mx, 0) * 14px), calc(var(--my, 0) * 14px), 0);
    }

    .ambient-blob.one { left: -23vmax; top: 8rem; }
    .ambient-blob.two { right: -27vmax; bottom: 2rem; animation-delay: -7s; opacity: 0.2; }

    @keyframes blobMorph {
      0% { border-radius: 36% 64% 58% 42% / 50% 32% 68% 50%; transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      50% { border-radius: 66% 34% 38% 62% / 42% 61% 39% 58%; transform: translate3d(3vw, -2vh, 0) rotate(12deg) scale(1.05); }
      100% { border-radius: 40% 60% 68% 32% / 64% 35% 65% 36%; transform: translate3d(-2vw, 3vh, 0) rotate(-8deg) scale(0.98); }
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 28%, rgba(47, 125, 255, 0.45), transparent 20rem),
        radial-gradient(circle at 70% 68%, rgba(255, 55, 95, 0.25), transparent 22rem),
        #040815;
      transition: opacity 560ms ease, visibility 560ms ease;
    }

    body.intro-done .splash {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-inner {
      text-align: center;
      display: grid;
      justify-items: center;
      gap: 20px;
    }

    .brand-logo {
      width: 54px;
      height: 54px;
      flex: 0 0 auto;
      position: relative;
      display: grid;
      place-items: center;
      border-radius: 18px;
      isolation: isolate;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.04)) padding-box,
        linear-gradient(145deg, rgba(116,215,255,0.95), rgba(245,196,107,0.95), rgba(255,55,95,0.9)) border-box;
      border: 1px solid transparent;
      box-shadow: 0 18px 42px rgba(47, 125, 255, 0.28), inset 0 1px 0 rgba(255,255,255,0.28);
      overflow: hidden;
    }

    .brand-logo::before {
      content: "";
      position: absolute;
      inset: -45%;
      z-index: -1;
      background: conic-gradient(from 0deg, var(--blue), var(--red), var(--gold), var(--green), var(--blue));
      animation: spinLogo 5s linear infinite;
      opacity: 0.68;
    }

    .brand-logo::after {
      content: "";
      position: absolute;
      inset: 5px;
      z-index: -1;
      border-radius: 14px;
      background: linear-gradient(145deg, #0a172a, #08101e 58%, #140812);
    }

    .brand-logo span {
      font-family: Poppins, Inter, sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.08em;
      transform: translateX(-1px);
      background: linear-gradient(135deg, #fff, #cdefff 42%, #f5c46b 78%);
      -webkit-background-clip: text;
      color: transparent;
      filter: drop-shadow(0 8px 18px rgba(116, 215, 255, 0.38));
    }

    .brand-logo.logo-large {
      width: clamp(92px, 24vw, 132px);
      height: clamp(92px, 24vw, 132px);
      border-radius: 34px;
      animation: logoIntro 1.1s cubic-bezier(.2,.8,.2,1) both, floatLogo 3s ease-in-out 1.1s infinite;
    }

    .brand-logo.logo-large::after { inset: 9px; border-radius: 26px; }
    .brand-logo.logo-large span { font-size: clamp(34px, 9vw, 50px); }

    @keyframes spinLogo { to { transform: rotate(360deg); } }
    @keyframes logoIntro { from { opacity: 0; transform: translateY(18px) scale(.76) rotate(-8deg); filter: blur(8px); } to { opacity: 1; transform: translateY(0) scale(1) rotate(0); filter: blur(0); } }
    @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

    .splash-title {
      margin: 0;
      max-width: 720px;
      font-family: Poppins, Inter, sans-serif;
      font-size: clamp(28px, 7.5vw, 58px);
      line-height: 1.03;
      letter-spacing: -0.055em;
      opacity: 0;
      transform: translateY(14px);
      filter: blur(8px);
    }

    .splash-title.show {
      animation: textReveal 760ms cubic-bezier(.2,.9,.2,1) forwards, glowPulse 1.8s ease-in-out 760ms infinite alternate;
    }

    @keyframes textReveal {
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes glowPulse {
      from { text-shadow: 0 0 14px rgba(116, 215, 255, 0.2); }
      to { text-shadow: 0 0 30px rgba(116, 215, 255, 0.46), 0 0 54px rgba(255, 55, 95, 0.18); }
    }

    .app-shell {
      min-height: 100vh;
      opacity: 0;
      visibility: hidden;
      transform: translateY(12px);
      transition: opacity 640ms ease, transform 640ms ease, visibility 640ms ease;
    }

    body.intro-done .app-shell {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 10px var(--safe-x);
      background: rgba(5, 9, 20, 0.66);
      border-bottom: 1px solid rgba(255,255,255,0.09);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-name {
      font-family: Poppins, Inter, sans-serif;
      font-size: clamp(16px, 4.4vw, 22px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      white-space: nowrap;
    }

    .brand-name small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-family: Inter, sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .menu-wrap { position: relative; }

    .hamburger {
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14);
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .hamburger:hover, .hamburger:focus-visible { transform: translateY(-2px); background: rgba(255,255,255,0.13); border-color: rgba(116,215,255,0.42); outline: none; }
    .hamburger-lines { width: 21px; display: grid; gap: 5px; }
    .hamburger-lines i { display: block; height: 2px; border-radius: 99px; background: currentColor; transition: transform 240ms ease, opacity 180ms ease; }
    .menu-open .hamburger-lines i:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-open .hamburger-lines i:nth-child(2) { opacity: 0; }
    .menu-open .hamburger-lines i:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .dropdown {
      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      width: min(310px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 24px;
      background: rgba(7, 17, 31, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
      transform: translateY(-8px) scale(0.98);
      transform-origin: top right;
      opacity: 0;
      visibility: hidden;
      transition: opacity 200ms ease, transform 200ms ease, visibility 200ms ease;
    }

    .menu-open .dropdown { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }

    .dropdown button {
      width: 100%;
      border: 0;
      color: var(--text);
      background: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 16px;
      font: 800 14px/1 Inter, sans-serif;
      cursor: pointer;
      text-align: left;
      transition: background 180ms ease, transform 180ms ease;
    }

    .dropdown button svg { width: 20px; height: 20px; color: var(--blue-2); }
    .dropdown button:hover, .dropdown button:focus-visible { background: rgba(255,255,255,0.09); transform: translateX(-3px); outline: none; }

    .view { min-height: calc(100vh - var(--header-h)); }

    .container {
      width: min(1180px, calc(100% - (var(--safe-x) * 2)));
      margin-inline: auto;
    }

    .hero {
      position: relative;
      min-height: calc(100vh - var(--header-h));
      display: grid;
      align-items: center;
      padding: clamp(36px, 8vh, 86px) 0 54px;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      gap: clamp(28px, 5vw, 56px);
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      color: #dcecff;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(36, 211, 102, 0.13), 0 0 20px rgba(36, 211, 102, 0.8);
    }

    h1, h2, h3 { font-family: Poppins, Inter, sans-serif; letter-spacing: -0.055em; }
    h1 {
      margin: 18px 0 16px;
      font-size: clamp(44px, 13vw, 98px);
      line-height: 0.94;
      max-width: 870px;
    }

    .gradient-text {
      background: linear-gradient(115deg, #fff 0%, #74d7ff 32%, #f5c46b 61%, #ff375f 100%);
      -webkit-background-clip: text;
      color: transparent;
    }

    .lead {
      margin: 0;
      max-width: 640px;
      color: #d4deed;
      font-size: clamp(16px, 3.8vw, 21px);
      line-height: 1.66;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 48px;
      padding: 13px 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      font: 900 14px/1 Inter, sans-serif;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 12px 28px rgba(0,0,0,0.22);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn svg { width: 20px; height: 20px; }
    .btn:hover, .btn:focus-visible { transform: translateY(-3px); border-color: rgba(116,215,255,0.45); box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 18px 38px rgba(47,125,255,0.18); outline: none; }
    .btn-primary { background: linear-gradient(135deg, var(--blue), #6d5cff 48%, var(--red)); border-color: rgba(255,255,255,0.22); }
    .btn-whatsapp { background: linear-gradient(135deg, var(--green), var(--green-dark)); border-color: rgba(255,255,255,0.22); color: #f8fff9; }
    .btn-dark { background: rgba(5, 9, 20, 0.58); }

    .hero-visual {
      position: relative;
      min-height: 420px;
    }

    .phone-card {
      position: relative;
      width: min(100%, 390px);
      margin-inline: auto;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 42px;
      padding: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04));
      backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      transform: perspective(900px) rotateY(-8deg) rotateX(5deg);
      animation: cardBreathe 4.8s ease-in-out infinite;
      overflow: hidden;
    }

    .phone-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 90deg, transparent, rgba(116,215,255,0.22), transparent, rgba(255,55,95,0.18), transparent);
      animation: spinLogo 9s linear infinite;
    }

    .phone-screen {
      position: relative;
      z-index: 1;
      overflow: hidden;
      border-radius: 30px;
      padding: 18px;
      min-height: 520px;
      background:
        linear-gradient(rgba(5,9,20,0.16), rgba(5,9,20,0.78)),
        url("https://www.dropbox.com/scl/fi/nz4cioh4jyxxn83txbmls/1779653285367-2.jpg?rlkey=t5yqnzr0p0s1e3tu6ipbzfil0&dl=1") center/cover;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .phone-pill {
      width: 82px;
      height: 6px;
      border-radius: 99px;
      margin: 0 auto 18px;
      background: rgba(255,255,255,0.42);
    }

    .mini-logo-line { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .mini-title { font-weight: 900; font-size: 13px; }
    .service-stack { display: grid; gap: 10px; margin-top: 80px; }
    .service-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 18px;
      background: rgba(5,9,20,0.46);
      backdrop-filter: blur(16px);
      box-shadow: 0 14px 34px rgba(0,0,0,0.22);
      animation: chipFloat 3.8s ease-in-out infinite;
    }
    .service-chip:nth-child(2) { animation-delay: -1.2s; }
    .service-chip:nth-child(3) { animation-delay: -2.4s; }
    .service-chip b { font-size: 13px; }
    .service-chip small { color: var(--muted); display: block; margin-top: 3px; }
    .chip-icon { width: 38px; height: 38px; border-radius: 13px; display: grid; place-items: center; background: linear-gradient(135deg, rgba(116,215,255,0.24), rgba(255,55,95,0.22)); }

    .floating-stat {
      position: absolute;
      z-index: 2;
      right: -8px;
      bottom: 52px;
      width: 180px;
      padding: 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      background: rgba(7, 17, 31, 0.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }
    .floating-stat strong { display: block; font: 900 28px/1 Poppins, sans-serif; color: var(--green); }
    .floating-stat span { color: var(--muted); font-size: 12px; font-weight: 800; }

    @keyframes cardBreathe { 0%,100% { transform: perspective(900px) rotateY(-8deg) rotateX(5deg) translateY(0); } 50% { transform: perspective(900px) rotateY(-4deg) rotateX(3deg) translateY(-12px); } }
    @keyframes chipFloat { 0%,100% { transform: translateX(0); } 50% { transform: translateX(8px); } }

    section { scroll-margin-top: calc(var(--header-h) + 24px); }
    .section { padding: clamp(54px, 9vw, 96px) 0; position: relative; }
    .section-head { display: grid; gap: 12px; margin-bottom: 26px; }
    .section-head.center { text-align: center; justify-items: center; }
    .section-kicker { color: var(--gold); text-transform: uppercase; letter-spacing: 0.14em; font-size: 12px; font-weight: 900; }
    .section-title { margin: 0; font-size: clamp(30px, 8vw, 58px); line-height: 1.03; max-width: 850px; }
    .section-copy { margin: 0; max-width: 730px; color: var(--muted); font-size: clamp(15px, 3.6vw, 18px); line-height: 1.7; }

    .glass-panel {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.045));
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px) saturate(145%);
      -webkit-backdrop-filter: blur(22px) saturate(145%);
    }

    .about-grid, .why-grid, .contact-grid {
      display: grid;
      gap: 16px;
    }

    .about-card { padding: clamp(22px, 5vw, 34px); overflow: hidden; position: relative; }
    .about-card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -70px;
      bottom: -80px;
      border-radius: 43% 57% 55% 45%;
      background: linear-gradient(135deg, rgba(47,125,255,0.28), rgba(36,211,102,0.2));
      filter: blur(3px);
    }
    .about-card h3 { margin: 0 0 12px; font-size: 24px; }
    .about-card p { margin: 0; color: #d4deed; line-height: 1.72; }

    .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
    .metric {
      padding: 14px 10px;
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      text-align: center;
    }
    .metric strong { display: block; font: 900 clamp(20px, 6vw, 32px)/1 Poppins, sans-serif; color: var(--blue-2); }
    .metric span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; font-weight: 800; }

    .services-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }

    .service-card {
      position: relative;
      overflow: hidden;
      min-height: 240px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.045));
      box-shadow: 0 18px 45px rgba(0,0,0,0.24);
      backdrop-filter: blur(20px);
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .service-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.34;
      background: var(--card-bg, radial-gradient(circle at 10% 0%, rgba(116,215,255,.4), transparent 44%));
      transition: opacity 220ms ease, transform 500ms ease;
    }

    .service-card::after {
      content: "";
      position: absolute;
      inset: auto -30px -38px auto;
      width: 160px;
      height: 160px;
      border-radius: 42% 58% 66% 34% / 44% 39% 61% 56%;

    function whatsappLink(message = DEFAULT_MESSAGE) {
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

    function setWhatsapp(message) {
      floatingWhatsapp.href = whatsappLink(message);
      floatingWhatsapp.innerHTML = svg('whatsapp');

    function closeMenu() {
      menuWrap.classList.remove('menu-open');
      menuButton.setAttribute('aria-expanded', 'false');

    function routeUrl(state) {
      if (state.view === 'service') return `#service-${state.serviceId}`;
      if (state.view === 'services') return '#nos-services';
      if (state.section && state.section !== 'accueil') return `#${state.section}`;
      return '#accueil';
    }

    function stateFromLocation() {
      const hash = window.location.hash.replace('#', '');
      if (hash.startsWith('service-')) return { view: 'service', section: null, serviceId: hash.replace('service-', '') };
      if (hash === 'nos-services') return { view: 'services', section: null, serviceId: null };
      return { view: 'home', section: hash || 'accueil', serviceId: null };
    }

    function navigate(state, push = true) {
      currentState = { view: state.view || 'home', section: state.section || null, serviceId: state.serviceId || null };
      if (push) history.pushState(currentState, '', routeUrl(currentState));
      render();
    }

      return `<a class="btn ${attrs.includes('whatsapp') ? 'btn-whatsapp' : attrs.includes('primary') ? 'btn-primary' : 'btn-dark'}" ${attrs}>${svg(icon)}<span>${label}</span></a>`;

        ['pourquoi', 'Pourquoi nous choisir', 'star']
      ];
      [...document.querySelectorAll('#siteMenu button')].forEach((button, index) => {
        const [, label, icon] = labels[index];
        button.innerHTML = `${svg(icon)}<span>${label}</span>`;
      });
    }

    function render() {
      if (currentState.view === 'services') renderServicesPage();
      else if (currentState.view === 'service') {
        const service = services.find((item) => item.id === currentState.serviceId) || services[0];
        renderServiceDetail(service);
      } else renderHome();

      attachInteractions();

      requestAnimationFrame(() => {
        if (currentState.view === 'home' && currentState.section) {
          const target = document.getElementById(currentState.section);
          if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        view.focus({ preventScroll: true });
      });
    }

    let revealObserver;
    function observeReveals() {
      if (revealObserver) revealObserver.disconnect();
      revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.14, rootMargin: '0px 0px -8% 0px' });
      document.querySelectorAll('.reveal').forEach((el) => revealObserver.observe(el));
    }

    function setupParallax() {
      let ticking = false;
      const apply = () => {
        document.documentElement.style.setProperty('--scroll', String(window.scrollY));
        ticking = false;
      };
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(apply);
          ticking = true;
        }
      }, { passive: true });

      window.addEventListener('pointermove', (event) => {
        const mx = (event.clientX / Math.max(window.innerWidth, 1) - 0.5).toFixed(3);
        const my = (event.clientY / Math.max(window.innerHeight, 1) - 0.5).toFixed(3);
        document.documentElement.style.setProperty('--mx', mx);
        document.documentElement.style.setProperty('--my', my);
      }, { passive: true });
    }

    menuButton.addEventListener('click', () => {
      const open = !menuWrap.classList.contains('menu-open');
      menuWrap.classList.toggle('menu-open', open);
      menuButton.setAttribute('aria-expanded', String(open));
    });

    document.addEventListener('click', (event) => {
      if (!menuWrap.contains(event.target)) closeMenu();
    });

    window.addEventListener('popstate', (event) => {
      currentState = event.state || stateFromLocation();
      render();
    });

    function init() {
      document.getElementById('year').textContent = new Date().getFullYear();
      setupParallax();
      currentState = stateFromLocation();
      history.replaceState(currentState, '', routeUrl(currentState));
      render();

      const splashTitle = document.getElementById('splashTitle');
      window.setTimeout(() => {
        splashTitle.classList.add('show');
        window.setTimeout(() => document.body.classList.add('intro-done'), 2000);
      }, 600);
    }

    init();
  </script>
</body>
</html>
